<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CryptoRSI - Seguimiento RSI</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --surface2: #334155;
      --text: #e2e8f0;
      --text-dim: #94a3b8;
      --green: #22c55e;
      --red: #ef4444;
      --yellow: #eab308;
      --orange: #f97316;
      --gray: #6b7280;
      --blue: #3b82f6;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--surface2);
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--blue);
    }

    .header h1 span { color: var(--text-dim); font-weight: 400; font-size: 0.9rem; }

    .header-actions {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      flex-wrap: wrap;
    }

    .btn {
      padding: 0.5rem 1rem;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 500;
      transition: opacity 0.2s;
    }

    .btn:hover { opacity: 0.85; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-primary { background: var(--blue); color: white; }
    .btn-danger { background: var(--red); color: white; }
    .btn-secondary { background: var(--surface2); color: var(--text); }
    .btn-green { background: var(--green); color: white; }
    .btn-sm { padding: 0.35rem 0.7rem; font-size: 0.75rem; }

    input {
      padding: 0.5rem 0.75rem;
      border: 1px solid var(--surface2);
      border-radius: 6px;
      background: var(--bg);
      color: var(--text);
      font-size: 0.875rem;
    }

    input::placeholder { color: var(--text-dim); }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 1.5rem;
    }

    .status-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .status-bar .updated {
      color: var(--text-dim);
      font-size: 0.8rem;
    }

    .loading {
      text-align: center;
      padding: 3rem;
      color: var(--text-dim);
    }

    .spinner {
      display: inline-block;
      width: 2rem;
      height: 2rem;
      border: 3px solid var(--surface2);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 1rem;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Tabs for main view */
    .main-tabs {
      display: flex;
      gap: 0;
      margin-bottom: 1.5rem;
      border-bottom: 2px solid var(--surface2);
    }

    .main-tab {
      padding: 0.6rem 1.2rem;
      border: none;
      background: transparent;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 500;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
    }

    .main-tab.active {
      color: var(--blue);
      border-bottom-color: var(--blue);
    }

    .main-tab:hover { color: var(--text); }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* Token cards grid */
    .tokens-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 1rem;
    }

    .token-card {
      background: var(--surface);
      border-radius: 12px;
      padding: 1.25rem;
      border: 1px solid var(--surface2);
      transition: border-color 0.2s;
      position: relative;
    }

    .token-card:hover { border-color: var(--blue); }
    .token-card.has-position { border-color: var(--green); }

    .token-card .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 1rem;
    }

    .token-card .token-info h3 {
      font-size: 1.1rem;
      font-weight: 600;
    }

    .token-card .token-info .token-name {
      color: var(--text-dim);
      font-size: 0.8rem;
    }

    .token-card .token-price {
      text-align: right;
    }

    .token-card .token-price .price {
      font-size: 1.2rem;
      font-weight: 600;
    }

    .token-card .remove-btn {
      position: absolute;
      top: 0.5rem;
      right: 0.5rem;
      background: none;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 1.2rem;
      padding: 0.25rem;
      line-height: 1;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .token-card:hover .remove-btn { opacity: 1; }
    .token-card .remove-btn:hover { color: var(--red); }

    /* RSI Value display */
    .rsi-main {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .rsi-gauge {
      position: relative;
      width: 80px;
      height: 80px;
    }

    .rsi-gauge svg {
      transform: rotate(-90deg);
    }

    .rsi-gauge .rsi-value {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 1.1rem;
      font-weight: 700;
    }

    .rsi-recommendation {
      flex: 1;
    }

    .rsi-recommendation .action-label {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
    }

    .rsi-recommendation .action-reason {
      font-size: 0.75rem;
      color: var(--text-dim);
    }

    /* Timeframe tabs */
    .timeframe-tabs {
      display: flex;
      gap: 0.25rem;
      margin-bottom: 0.75rem;
    }

    .timeframe-tab {
      padding: 0.3rem 0.6rem;
      border: none;
      border-radius: 4px;
      background: transparent;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 0.75rem;
      font-weight: 500;
    }

    .timeframe-tab.active {
      background: var(--surface2);
      color: var(--text);
    }

    .timeframe-tab:hover { color: var(--text); }

    /* Mini RSI chart */
    .rsi-chart {
      height: 40px;
      display: flex;
      align-items: flex-end;
      gap: 2px;
    }

    .rsi-chart .bar {
      flex: 1;
      min-width: 4px;
      border-radius: 2px 2px 0 0;
      transition: height 0.3s;
    }

    .rsi-scale {
      display: flex;
      justify-content: space-between;
      font-size: 0.65rem;
      color: var(--text-dim);
      margin-top: 0.25rem;
    }

    /* Trade panel in card */
    .trade-panel {
      margin-top: 1rem;
      padding-top: 0.75rem;
      border-top: 1px solid var(--surface2);
    }

    .trade-actions {
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }

    .trade-actions input {
      width: 80px;
      font-size: 0.8rem;
      padding: 0.35rem 0.5rem;
    }

    .position-info {
      margin-top: 0.6rem;
      padding: 0.6rem;
      background: rgba(34, 197, 94, 0.08);
      border: 1px solid rgba(34, 197, 94, 0.2);
      border-radius: 8px;
    }

    .position-info.negative {
      background: rgba(239, 68, 68, 0.08);
      border-color: rgba(239, 68, 68, 0.2);
    }

    .position-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.8rem;
      line-height: 1.6;
    }

    .position-row .label { color: var(--text-dim); }
    .position-row .value { font-weight: 600; }
    .pnl-positive { color: var(--green); }
    .pnl-negative { color: var(--red); }

    .token-error {
      color: var(--red);
      font-size: 0.8rem;
      padding: 0.5rem;
    }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.6);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.active { display: flex; }

    .modal {
      background: var(--surface);
      border-radius: 12px;
      padding: 1.5rem;
      width: 90%;
      max-width: 400px;
      border: 1px solid var(--surface2);
    }

    .modal h2 { margin-bottom: 1rem; font-size: 1.1rem; }
    .modal .form-group { margin-bottom: 1rem; }
    .modal label { display: block; margin-bottom: 0.25rem; font-size: 0.85rem; color: var(--text-dim); }
    .modal input { width: 100%; }
    .modal .modal-actions { display: flex; gap: 0.5rem; justify-content: flex-end; margin-top: 1.5rem; }

    .legend {
      display: flex;
      gap: 1rem;
      margin-bottom: 1rem;
      font-size: 0.8rem;
      color: var(--text-dim);
      flex-wrap: wrap;
    }

    .legend-item { display: flex; align-items: center; gap: 0.3rem; }
    .legend-dot { width: 8px; height: 8px; border-radius: 50%; }

    /* Stats panel */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .stat-card {
      background: var(--surface);
      border-radius: 10px;
      padding: 1rem;
      border: 1px solid var(--surface2);
      text-align: center;
    }

    .stat-card .stat-value {
      font-size: 1.4rem;
      font-weight: 700;
      margin-top: 0.25rem;
    }

    .stat-card .stat-label {
      font-size: 0.75rem;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* History table */
    .history-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.8rem;
    }

    .history-table th {
      text-align: left;
      padding: 0.6rem 0.5rem;
      border-bottom: 1px solid var(--surface2);
      color: var(--text-dim);
      font-weight: 500;
      font-size: 0.75rem;
      text-transform: uppercase;
    }

    .history-table td {
      padding: 0.6rem 0.5rem;
      border-bottom: 1px solid rgba(51,65,85,0.5);
    }

    .history-table tr:hover td { background: rgba(51,65,85,0.3); }

    .history-empty {
      text-align: center;
      padding: 2rem;
      color: var(--text-dim);
      font-size: 0.85rem;
    }

    @media (max-width: 600px) {
      .tokens-grid { grid-template-columns: 1fr; }
      .header { padding: 1rem; }
      .container { padding: 1rem; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

<div class="header">
  <h1>CryptoRSI <span>Seguimiento RSI Personal</span></h1>
  <div class="header-actions">
    <button class="btn btn-secondary" onclick="refreshAll()" id="refreshBtn">Actualizar</button>
    <button class="btn btn-primary" onclick="openAddModal()">+ Añadir Token</button>
  </div>
</div>

<div class="container">
  <div class="status-bar">
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div> Comprar (RSI &le; 30)</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--yellow)"></div> Esperar</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--red)"></div> Vender (RSI &ge; 70)</div>
    </div>
    <span class="updated" id="updatedAt"></span>
  </div>

  <!-- Main Tabs -->
  <div class="main-tabs">
    <button class="main-tab active" onclick="switchMainTab('dashboard')">Dashboard</button>
    <button class="main-tab" onclick="switchMainTab('history')">Historial Trades</button>
  </div>

  <!-- Dashboard Tab -->
  <div id="tab-dashboard" class="tab-content active">
    <div id="loading" class="loading">
      <div class="spinner"></div>
      <p>Cargando datos RSI...</p>
    </div>
    <div id="tokensGrid" class="tokens-grid"></div>
  </div>

  <!-- History Tab -->
  <div id="tab-history" class="tab-content">
    <div id="statsGrid" class="stats-grid"></div>
    <div id="historyTable"></div>
  </div>
</div>

<!-- Add Token Modal -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <h2>Añadir Token</h2>
    <div class="form-group">
      <label>Símbolo (ej: BTC, ETH, SOL)</label>
      <input type="text" id="newSymbol" placeholder="BTC" maxlength="20" />
    </div>
    <div class="form-group">
      <label>Nombre (opcional)</label>
      <input type="text" id="newName" placeholder="Bitcoin" />
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeAddModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="addToken()">Añadir</button>
    </div>
  </div>
</div>

<script>
const API = '';
let allData = [];
let openPositions = {};

// ============================================================
// Helpers
// ============================================================

async function fetchJSON(url) {
  const res = await fetch(API + url);
  return res.json();
}

function getRSIColor(rsi) {
  if (rsi >= 70) return 'var(--red)';
  if (rsi >= 60) return 'var(--yellow)';
  if (rsi <= 30) return 'var(--green)';
  if (rsi <= 40) return 'var(--orange)';
  return 'var(--gray)';
}

function getRSIArcColor(rsi) {
  if (rsi >= 70) return '#ef4444';
  if (rsi >= 60) return '#eab308';
  if (rsi <= 30) return '#22c55e';
  if (rsi <= 40) return '#f97316';
  return '#6b7280';
}

function formatPrice(price) {
  if (price === null || price === undefined) return 'N/A';
  if (price >= 1) return '$' + price.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  if (price >= 0.01) return '$' + price.toFixed(4);
  return '$' + price.toFixed(8);
}

function formatPnl(pnl, pct) {
  const cls = pnl >= 0 ? 'pnl-positive' : 'pnl-negative';
  const sign = pnl >= 0 ? '+' : '';
  return `<span class="${cls}">${sign}${pnl.toFixed(2)} (${sign}${pct.toFixed(2)}%)</span>`;
}

function timeAgo(dateStr) {
  const diff = Date.now() - new Date(dateStr).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 60) return `hace ${mins}min`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `hace ${hrs}h`;
  return `hace ${Math.floor(hrs / 24)}d`;
}

// ============================================================
// Render functions
// ============================================================

function renderRSIGauge(rsi) {
  if (rsi === null || rsi === undefined) return '<span style="color:var(--text-dim)">N/A</span>';
  const color = getRSIArcColor(rsi);
  const pct = rsi / 100;
  const r = 32;
  const circ = 2 * Math.PI * r;
  const dash = circ * pct;
  const colorVal = getRSIColor(rsi);

  return `
    <div class="rsi-gauge">
      <svg width="80" height="80" viewBox="0 0 80 80">
        <circle cx="40" cy="40" r="${r}" fill="none" stroke="#334155" stroke-width="6" />
        <circle cx="40" cy="40" r="${r}" fill="none" stroke="${color}" stroke-width="6"
          stroke-dasharray="${dash} ${circ}" stroke-linecap="round" />
      </svg>
      <div class="rsi-value" style="color:${colorVal}">${rsi.toFixed(1)}</div>
    </div>`;
}

function renderRSIChart(history) {
  if (!history || history.length === 0) return '';
  return `<div class="rsi-chart">${history.map(v => {
    const h = (v / 100) * 40;
    const c = getRSIArcColor(v);
    return `<div class="bar" style="height:${h}px;background:${c}" title="RSI: ${v.toFixed(1)}"></div>`;
  }).join('')}</div>`;
}

function renderPositionPanel(symbol) {
  const pos = openPositions[symbol];
  if (!pos) {
    return `
      <div class="trade-panel">
        <div class="trade-actions">
          <input type="number" id="amount-${symbol}" placeholder="$100" value="100" min="1" step="10" />
          <button class="btn btn-green btn-sm" onclick="buyToken('${symbol}')">Comprar</button>
        </div>
      </div>`;
  }

  const pnl = pos.pnl || 0;
  const pnlPct = pos.pnlPct || 0;
  const isNeg = pnl < 0;
  const pnlCls = isNeg ? 'pnl-negative' : 'pnl-positive';

  return `
    <div class="trade-panel">
      <div class="position-info ${isNeg ? 'negative' : ''}">
        <div class="position-row">
          <span class="label">Entrada</span>
          <span class="value">${formatPrice(pos.entryPrice)} <span style="color:var(--text-dim);font-size:0.7rem">(RSI: ${pos.rsiAtOpen ? pos.rsiAtOpen.toFixed(1) : 'N/A'})</span></span>
        </div>
        <div class="position-row">
          <span class="label">Actual</span>
          <span class="value">${formatPrice(pos.currentPrice)}</span>
        </div>
        <div class="position-row">
          <span class="label">Invertido</span>
          <span class="value">$${pos.amount.toFixed(2)}</span>
        </div>
        <div class="position-row">
          <span class="label">PnL</span>
          <span class="value ${pnlCls}">${pnl >= 0 ? '+' : ''}${pnl.toFixed(2)} (${pnl >= 0 ? '+' : ''}${pnlPct.toFixed(2)}%)</span>
        </div>
        <div class="position-row">
          <span class="label">Abierto</span>
          <span class="value" style="font-size:0.7rem;color:var(--text-dim)">${timeAgo(pos.openedAt)}</span>
        </div>
      </div>
      <div style="margin-top:0.5rem">
        <button class="btn btn-danger btn-sm" onclick="sellToken('${symbol}')">Vender</button>
      </div>
    </div>`;
}

function renderTokenCard(data) {
  if (data.error) {
    return `
      <div class="token-card">
        <div class="card-header">
          <div class="token-info">
            <h3>${data.symbol}</h3>
            <div class="token-name">${data.name || ''}</div>
          </div>
        </div>
        <div class="token-error">Error: ${data.error}</div>
        <button class="remove-btn" onclick="removeToken('${data.symbol}')" title="Eliminar">&times;</button>
      </div>`;
  }

  const primaryRSI = data.primaryRSI;
  const rec = data.recommendation || {};
  const colorStyle = rec.color ? `color:${rec.color}` : '';
  const activeTimeframes = Object.entries(data.timeframes || {}).filter(([_, v]) => v.rsi !== null);
  const hasPosition = !!openPositions[data.symbol];

  return `
    <div class="token-card ${hasPosition ? 'has-position' : ''}">
      <button class="remove-btn" onclick="removeToken('${data.symbol}')" title="Eliminar">&times;</button>
      <div class="card-header">
        <div class="token-info">
          <h3>${data.symbol} ${hasPosition ? '<span style="color:var(--green);font-size:0.7rem">EN POSICION</span>' : ''}</h3>
          <div class="token-name">${data.name || ''}</div>
        </div>
        <div class="token-price">
          <div class="price">${formatPrice(data.price)}</div>
        </div>
      </div>

      <div class="rsi-main">
        ${renderRSIGauge(primaryRSI)}
        <div class="rsi-recommendation">
          <div class="action-label" style="${colorStyle}">${rec.label || 'N/A'}</div>
          <div class="action-reason">${rec.reason || ''}</div>
        </div>
      </div>

      ${activeTimeframes.length > 0 ? `
        <div class="timeframe-tabs">
          ${activeTimeframes.map(([tf, d], i) => `
            <button class="timeframe-tab ${i === 0 ? 'active' : ''}"
              onclick="switchTimeframe(this, '${data.symbol}', '${tf}')">${tf} <span style="color:${getRSIArcColor(d.rsi)}">${d.rsi?.toFixed(1) || ''}</span></button>
          `).join('')}
        </div>
        <div class="tf-chart" data-symbol="${data.symbol}">
          ${renderRSIChart(activeTimeframes[0]?.[1]?.rsiHistory || [])}
        </div>
        <div class="rsi-scale">
          <span style="color:var(--green)">30</span>
          <span>50</span>
          <span style="color:var(--red)">70</span>
        </div>
      ` : '<div style="color:var(--text-dim);font-size:0.8rem">Sin datos suficientes</div>'}

      ${renderPositionPanel(data.symbol)}
    </div>`;
}

// ============================================================
// Tab switching
// ============================================================

function switchMainTab(tab) {
  document.querySelectorAll('.main-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById(`tab-${tab}`).classList.add('active');

  if (tab === 'history') loadHistory();
}

// ============================================================
// Trading actions
// ============================================================

async function buyToken(symbol) {
  const amountInput = document.getElementById(`amount-${symbol}`);
  const amount = amountInput ? parseFloat(amountInput.value) || 100 : 100;

  try {
    const res = await fetch('/api/trade/buy', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ symbol, amount })
    });
    const data = await res.json();

    if (data.success) {
      await refreshAll();
    } else {
      alert(data.message);
    }
  } catch (e) {
    alert('Error: ' + e.message);
  }
}

async function sellToken(symbol) {
  if (!confirm(`¿Vender posición de ${symbol}?`)) return;

  try {
    const res = await fetch('/api/trade/sell', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ symbol })
    });
    const data = await res.json();

    if (data.success) {
      const t = data.trade;
      const pnlSign = t.pnl >= 0 ? '+' : '';
      alert(`${t.symbol} vendido!\nEntrada: ${formatPrice(t.entryPrice)}\nSalida: ${formatPrice(t.exitPrice)}\nPnL: ${pnlSign}$${t.pnl.toFixed(2)} (${pnlSign}${t.pnlPct.toFixed(2)}%)`);
      await refreshAll();
    } else {
      alert(data.message);
    }
  } catch (e) {
    alert('Error: ' + e.message);
  }
}

// ============================================================
// History & Stats
// ============================================================

async function loadHistory() {
  const [stats, history] = await Promise.all([
    fetchJSON('/api/trade/stats'),
    fetchJSON('/api/trade/history')
  ]);

  // Stats cards
  document.getElementById('statsGrid').innerHTML = `
    <div class="stat-card">
      <div class="stat-label">Total Trades</div>
      <div class="stat-value">${stats.totalTrades}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Win Rate</div>
      <div class="stat-value" style="color:${stats.winRate >= 50 ? 'var(--green)' : 'var(--red)'}">${stats.winRate.toFixed(0)}%</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">PnL Total</div>
      <div class="stat-value" style="color:${stats.totalPnl >= 0 ? 'var(--green)' : 'var(--red)'}">
        ${stats.totalPnl >= 0 ? '+' : ''}$${stats.totalPnl.toFixed(2)}
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-label">PnL Medio</div>
      <div class="stat-value" style="color:${stats.avgPnlPct >= 0 ? 'var(--green)' : 'var(--red)'}">
        ${stats.avgPnlPct >= 0 ? '+' : ''}${stats.avgPnlPct.toFixed(2)}%
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Wins / Losses</div>
      <div class="stat-value"><span style="color:var(--green)">${stats.wins}</span> / <span style="color:var(--red)">${stats.losses}</span></div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Mejor Trade</div>
      <div class="stat-value" style="font-size:1rem">${stats.bestTrade ? formatPnl(stats.bestTrade.pnl, stats.bestTrade.pnlPct) + ' (' + stats.bestTrade.symbol + ')' : 'N/A'}</div>
    </div>
  `;

  // History table
  if (history.length === 0) {
    document.getElementById('historyTable').innerHTML = '<div class="history-empty">Aún no hay trades cerrados. Abre posiciones desde el Dashboard.</div>';
    return;
  }

  const rows = history.sort((a, b) => new Date(b.closedAt) - new Date(a.closedAt)).map(t => `
    <tr>
      <td><strong>${t.symbol}</strong></td>
      <td>${formatPrice(t.entryPrice)} <span style="color:var(--text-dim);font-size:0.7rem">(RSI:${t.rsiAtOpen ? t.rsiAtOpen.toFixed(0) : '-'})</span></td>
      <td>${formatPrice(t.exitPrice)} <span style="color:var(--text-dim);font-size:0.7rem">(RSI:${t.rsiAtClose ? t.rsiAtClose.toFixed(0) : '-'})</span></td>
      <td>$${t.amount.toFixed(0)}</td>
      <td>${formatPnl(t.pnl, t.pnlPct)}</td>
      <td style="color:var(--text-dim);font-size:0.7rem">${new Date(t.closedAt).toLocaleString('es-ES')}</td>
    </tr>
  `).join('');

  document.getElementById('historyTable').innerHTML = `
    <table class="history-table">
      <thead>
        <tr>
          <th>Token</th>
          <th>Entrada</th>
          <th>Salida</th>
          <th>Invertido</th>
          <th>PnL</th>
          <th>Fecha</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>`;
}

// ============================================================
// Timeframe switching
// ============================================================

function switchTimeframe(btn, symbol, tf) {
  const card = btn.closest('.token-card');
  card.querySelectorAll('.timeframe-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');

  const tokenData = allData.find(d => d.symbol === symbol);
  if (tokenData && tokenData.timeframes && tokenData.timeframes[tf]) {
    const chartDiv = card.querySelector('.tf-chart');
    chartDiv.innerHTML = renderRSIChart(tokenData.timeframes[tf].rsiHistory || []);
  }
}

// ============================================================
// Main refresh
// ============================================================

async function refreshAll() {
  const btn = document.getElementById('refreshBtn');
  const grid = document.getElementById('tokensGrid');
  const loading = document.getElementById('loading');

  btn.disabled = true;
  btn.textContent = 'Actualizando...';
  loading.style.display = 'block';
  grid.innerHTML = '';

  try {
    const [rsiData, positions] = await Promise.all([
      fetchJSON('/api/rsi'),
      fetchJSON('/api/trade/positions')
    ]);

    // Index positions by symbol
    openPositions = {};
    for (const pos of positions) {
      openPositions[pos.symbol] = pos;
    }

    allData = rsiData;
    grid.innerHTML = allData.map(renderTokenCard).join('');
    document.getElementById('updatedAt').textContent = 'Actualizado: ' + new Date().toLocaleString('es-ES');
  } catch (e) {
    grid.innerHTML = `<div class="token-error">Error al cargar datos: ${e.message}</div>`;
  } finally {
    loading.style.display = 'none';
    btn.disabled = false;
    btn.textContent = 'Actualizar';
  }
}

// ============================================================
// Token management
// ============================================================

function openAddModal() {
  document.getElementById('addModal').classList.add('active');
  document.getElementById('newSymbol').value = '';
  document.getElementById('newName').value = '';
  document.getElementById('newSymbol').focus();
}

function closeAddModal() {
  document.getElementById('addModal').classList.remove('active');
}

async function addToken() {
  const symbol = document.getElementById('newSymbol').value.trim();
  const name = document.getElementById('newName').value.trim();

  if (!symbol) { alert('Introduce un símbolo'); return; }

  try {
    const res = await fetch('/api/tokens', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ symbol, name })
    });
    const data = await res.json();
    if (data.success) { closeAddModal(); refreshAll(); }
    else { alert(data.message); }
  } catch (e) { alert('Error: ' + e.message); }
}

async function removeToken(symbol) {
  if (!confirm(`¿Eliminar ${symbol} de la lista?`)) return;
  try {
    await fetch(`/api/tokens/${symbol}`, { method: 'DELETE' });
    refreshAll();
  } catch (e) { alert('Error: ' + e.message); }
}

// ============================================================
// Init
// ============================================================

document.getElementById('addModal').addEventListener('click', (e) => {
  if (e.target.classList.contains('modal-overlay')) closeAddModal();
});

document.getElementById('newSymbol').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') addToken();
});

refreshAll();
setInterval(refreshAll, 5 * 60 * 1000);
</script>
