<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CryptoRSI - Seguimiento RSI</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --surface2: #334155;
      --text: #e2e8f0;
      --text-dim: #94a3b8;
      --green: #22c55e;
      --red: #ef4444;
      --yellow: #eab308;
      --orange: #f97316;
      --gray: #6b7280;
      --blue: #3b82f6;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--surface2);
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--blue);
    }

    .header h1 span { color: var(--text-dim); font-weight: 400; font-size: 0.9rem; }

    .header-actions {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      flex-wrap: wrap;
    }

    .btn {
      padding: 0.5rem 1rem;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 500;
      transition: opacity 0.2s;
    }

    .btn:hover { opacity: 0.85; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-primary { background: var(--blue); color: white; }
    .btn-danger { background: var(--red); color: white; }
    .btn-secondary { background: var(--surface2); color: var(--text); }

    input {
      padding: 0.5rem 0.75rem;
      border: 1px solid var(--surface2);
      border-radius: 6px;
      background: var(--bg);
      color: var(--text);
      font-size: 0.875rem;
    }

    input::placeholder { color: var(--text-dim); }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 1.5rem;
    }

    .status-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .status-bar .updated {
      color: var(--text-dim);
      font-size: 0.8rem;
    }

    .loading {
      text-align: center;
      padding: 3rem;
      color: var(--text-dim);
    }

    .spinner {
      display: inline-block;
      width: 2rem;
      height: 2rem;
      border: 3px solid var(--surface2);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 1rem;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Token cards grid */
    .tokens-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 1rem;
    }

    .token-card {
      background: var(--surface);
      border-radius: 12px;
      padding: 1.25rem;
      border: 1px solid var(--surface2);
      transition: border-color 0.2s;
      position: relative;
    }

    .token-card:hover { border-color: var(--blue); }

    .token-card .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 1rem;
    }

    .token-card .token-info h3 {
      font-size: 1.1rem;
      font-weight: 600;
    }

    .token-card .token-info .token-name {
      color: var(--text-dim);
      font-size: 0.8rem;
    }

    .token-card .token-price {
      text-align: right;
    }

    .token-card .token-price .price {
      font-size: 1.2rem;
      font-weight: 600;
    }

    .token-card .token-price .price-source {
      color: var(--text-dim);
      font-size: 0.7rem;
    }

    .token-card .remove-btn {
      position: absolute;
      top: 0.5rem;
      right: 0.5rem;
      background: none;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 1.2rem;
      padding: 0.25rem;
      line-height: 1;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .token-card:hover .remove-btn { opacity: 1; }
    .token-card .remove-btn:hover { color: var(--red); }

    /* RSI Value display */
    .rsi-main {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .rsi-gauge {
      position: relative;
      width: 80px;
      height: 80px;
    }

    .rsi-gauge svg {
      transform: rotate(-90deg);
    }

    .rsi-gauge .rsi-value {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 1.1rem;
      font-weight: 700;
    }

    .rsi-recommendation {
      flex: 1;
    }

    .rsi-recommendation .action-label {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
    }

    .rsi-recommendation .action-reason {
      font-size: 0.75rem;
      color: var(--text-dim);
    }

    /* Timeframe tabs */
    .timeframe-tabs {
      display: flex;
      gap: 0.25rem;
      margin-bottom: 0.75rem;
    }

    .timeframe-tab {
      padding: 0.3rem 0.6rem;
      border: none;
      border-radius: 4px;
      background: transparent;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 0.75rem;
      font-weight: 500;
    }

    .timeframe-tab.active {
      background: var(--surface2);
      color: var(--text);
    }

    .timeframe-tab:hover { color: var(--text); }

    /* Mini RSI chart */
    .rsi-chart {
      height: 40px;
      display: flex;
      align-items: flex-end;
      gap: 2px;
    }

    .rsi-chart .bar {
      flex: 1;
      min-width: 4px;
      border-radius: 2px 2px 0 0;
      transition: height 0.3s;
    }

    /* RSI scale */
    .rsi-scale {
      display: flex;
      justify-content: space-between;
      font-size: 0.65rem;
      color: var(--text-dim);
      margin-top: 0.25rem;
    }

    .token-error {
      color: var(--red);
      font-size: 0.8rem;
      padding: 0.5rem;
    }

    /* Add token modal */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.6);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.active { display: flex; }

    .modal {
      background: var(--surface);
      border-radius: 12px;
      padding: 1.5rem;
      width: 90%;
      max-width: 400px;
      border: 1px solid var(--surface2);
    }

    .modal h2 {
      margin-bottom: 1rem;
      font-size: 1.1rem;
    }

    .modal .form-group {
      margin-bottom: 1rem;
    }

    .modal label {
      display: block;
      margin-bottom: 0.25rem;
      font-size: 0.85rem;
      color: var(--text-dim);
    }

    .modal input {
      width: 100%;
    }

    .modal .modal-actions {
      display: flex;
      gap: 0.5rem;
      justify-content: flex-end;
      margin-top: 1.5rem;
    }

    .legend {
      display: flex;
      gap: 1rem;
      margin-bottom: 1rem;
      font-size: 0.8rem;
      color: var(--text-dim);
      flex-wrap: wrap;
    }

    .legend-item { display: flex; align-items: center; gap: 0.3rem; }
    .legend-dot { width: 8px; height: 8px; border-radius: 50%; }

    @media (max-width: 600px) {
      .tokens-grid { grid-template-columns: 1fr; }
      .header { padding: 1rem; }
      .container { padding: 1rem; }
    }
  </style>
</head>
<body>

<div class="header">
  <h1>CryptoRSI <span>Seguimiento RSI Personal</span></h1>
  <div class="header-actions">
    <button class="btn btn-secondary" onclick="refreshAll()" id="refreshBtn">Actualizar</button>
    <button class="btn btn-primary" onclick="openAddModal()">+ Añadir Token</button>
  </div>
</div>

<div class="container">
  <div class="status-bar">
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div> Comprar (RSI &le; 30)</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--yellow)"></div> Esperar</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--red)"></div> Vender (RSI &ge; 70)</div>
    </div>
    <span class="updated" id="updatedAt"></span>
  </div>

  <div id="loading" class="loading">
    <div class="spinner"></div>
    <p>Cargando datos RSI...</p>
  </div>

  <div id="tokensGrid" class="tokens-grid"></div>
</div>

<!-- Add Token Modal -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <h2>Añadir Token</h2>
    <div class="form-group">
      <label>Símbolo (ej: BTC, ETH, SOL)</label>
      <input type="text" id="newSymbol" placeholder="BTC" maxlength="20" />
    </div>
    <div class="form-group">
      <label>Nombre (opcional)</label>
      <input type="text" id="newName" placeholder="Bitcoin" />
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeAddModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="addToken()">Añadir</button>
    </div>
  </div>
</div>

<script>
const API = '';

let allData = [];

async function fetchJSON(url) {
  const res = await fetch(API + url);
  return res.json();
}

function getRSIColor(rsi) {
  if (rsi >= 70) return 'var(--red)';
  if (rsi >= 60) return 'var(--yellow)';
  if (rsi <= 30) return 'var(--green)';
  if (rsi <= 40) return 'var(--orange)';
  return 'var(--gray)';
}

function getRSIArcColor(rsi) {
  if (rsi >= 70) return '#ef4444';
  if (rsi >= 60) return '#eab308';
  if (rsi <= 30) return '#22c55e';
  if (rsi <= 40) return '#f97316';
  return '#6b7280';
}

function renderRSIGauge(rsi) {
  if (rsi === null || rsi === undefined) return '<span style="color:var(--text-dim)">N/A</span>';
  const color = getRSIArcColor(rsi);
  const pct = rsi / 100;
  const r = 32;
  const circ = 2 * Math.PI * r;
  const dash = circ * pct;
  const colorVal = getRSIColor(rsi);

  return `
    <div class="rsi-gauge">
      <svg width="80" height="80" viewBox="0 0 80 80">
        <circle cx="40" cy="40" r="${r}" fill="none" stroke="#334155" stroke-width="6" />
        <circle cx="40" cy="40" r="${r}" fill="none" stroke="${color}" stroke-width="6"
          stroke-dasharray="${dash} ${circ}" stroke-linecap="round" />
      </svg>
      <div class="rsi-value" style="color:${colorVal}">${rsi.toFixed(1)}</div>
    </div>`;
}

function renderRSIChart(history) {
  if (!history || history.length === 0) return '';
  const max = 100;
  return `<div class="rsi-chart">${history.map(v => {
    const h = (v / max) * 40;
    const c = getRSIArcColor(v);
    return `<div class="bar" style="height:${h}px;background:${c}" title="RSI: ${v.toFixed(1)}"></div>`;
  }).join('')}</div>`;
}

function formatPrice(price) {
  if (price === null || price === undefined) return 'N/A';
  if (price >= 1) return '$' + price.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  if (price >= 0.01) return '$' + price.toFixed(4);
  return '$' + price.toFixed(8);
}

function renderTokenCard(data) {
  if (data.error) {
    return `
      <div class="token-card">
        <div class="card-header">
          <div class="token-info">
            <h3>${data.symbol}</h3>
            <div class="token-name">${data.name || ''}</div>
          </div>
        </div>
        <div class="token-error">Error: ${data.error}</div>
        <button class="remove-btn" onclick="removeToken('${data.symbol}')" title="Eliminar">&times;</button>
      </div>`;
  }

  const primaryRSI = data.primaryRSI;
  const rec = data.recommendation || {};
  const colorStyle = rec.color ? `color:${rec.color}` : '';
  const activeTimeframes = Object.entries(data.timeframes || {}).filter(([_, v]) => v.rsi !== null);

  return `
    <div class="token-card">
      <button class="remove-btn" onclick="removeToken('${data.symbol}')" title="Eliminar">&times;</button>
      <div class="card-header">
        <div class="token-info">
          <h3>${data.symbol}</h3>
          <div class="token-name">${data.name || ''}</div>
        </div>
        <div class="token-price">
          <div class="price">${formatPrice(data.price)}</div>
        </div>
      </div>

      <div class="rsi-main">
        ${renderRSIGauge(primaryRSI)}
        <div class="rsi-recommendation">
          <div class="action-label" style="${colorStyle}">${rec.label || 'N/A'}</div>
          <div class="action-reason">${rec.reason || ''}</div>
        </div>
      </div>

      ${activeTimeframes.length > 0 ? `
        <div class="timeframe-tabs">
          ${activeTimeframes.map(([tf, d], i) => `
            <button class="timeframe-tab ${i === 0 ? 'active' : ''}"
              onclick="switchTimeframe(this, '${data.symbol}', '${tf}')">${tf} <span style="color:${getRSIArcColor(d.rsi)}">${d.rsi?.toFixed(1) || ''}</span></button>
          `).join('')}
        </div>
        <div class="tf-chart" data-symbol="${data.symbol}">
          ${renderRSIChart(activeTimeframes[0]?.[1]?.rsiHistory || [])}
        </div>
        <div class="rsi-scale">
          <span style="color:var(--green)">30</span>
          <span>50</span>
          <span style="color:var(--red)">70</span>
        </div>
      ` : '<div style="color:var(--text-dim);font-size:0.8rem">Sin datos suficientes</div>'}
    </div>`;
}

function switchTimeframe(btn, symbol, tf) {
  const card = btn.closest('.token-card');
  card.querySelectorAll('.timeframe-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');

  const tokenData = allData.find(d => d.symbol === symbol);
  if (tokenData && tokenData.timeframes && tokenData.timeframes[tf]) {
    const chartDiv = card.querySelector('.tf-chart');
    chartDiv.innerHTML = renderRSIChart(tokenData.timeframes[tf].rsiHistory || []);
  }
}

async function refreshAll() {
  const btn = document.getElementById('refreshBtn');
  const grid = document.getElementById('tokensGrid');
  const loading = document.getElementById('loading');

  btn.disabled = true;
  btn.textContent = 'Actualizando...';
  loading.style.display = 'block';
  grid.innerHTML = '';

  try {
    allData = await fetchJSON('/api/rsi');
    grid.innerHTML = allData.map(renderTokenCard).join('');
    document.getElementById('updatedAt').textContent = 'Actualizado: ' + new Date().toLocaleString('es-ES');
  } catch (e) {
    grid.innerHTML = `<div class="token-error">Error al cargar datos: ${e.message}</div>`;
  } finally {
    loading.style.display = 'none';
    btn.disabled = false;
    btn.textContent = 'Actualizar';
  }
}

function openAddModal() {
  document.getElementById('addModal').classList.add('active');
  document.getElementById('newSymbol').value = '';
  document.getElementById('newName').value = '';
  document.getElementById('newSymbol').focus();
}

function closeAddModal() {
  document.getElementById('addModal').classList.remove('active');
}

async function addToken() {
  const symbol = document.getElementById('newSymbol').value.trim();
  const name = document.getElementById('newName').value.trim();

  if (!symbol) {
    alert('Introduce un símbolo');
    return;
  }

  try {
    const res = await fetch('/api/tokens', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ symbol, name })
    });
    const data = await res.json();
    if (data.success) {
      closeAddModal();
      refreshAll();
    } else {
      alert(data.message);
    }
  } catch (e) {
    alert('Error: ' + e.message);
  }
}

async function removeToken(symbol) {
  if (!confirm(`¿Eliminar ${symbol} de la lista?`)) return;

  try {
    await fetch(`/api/tokens/${symbol}`, { method: 'DELETE' });
    refreshAll();
  } catch (e) {
    alert('Error: ' + e.message);
  }
}

// Close modal on outside click
document.getElementById('addModal').addEventListener('click', (e) => {
  if (e.target.classList.contains('modal-overlay')) closeAddModal();
});

// Enter key in add modal
document.getElementById('newSymbol').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') addToken();
});

// Initial load
refreshAll();

// Auto refresh every 5 minutes
setInterval(refreshAll, 5 * 60 * 1000);
</script>

</body>
</html>
